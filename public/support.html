<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>サポート申請 - WEB受注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* サポートページ専用の微調整 */
        .support-form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 40px auto; /* 上下の余白を少し広げました */
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* ラジオボタン用のスタイル調整 */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #e9ecef;
        }

        .radio-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: normal !important; /* 太字解除 */
        }

        .radio-label input {
            width: auto !important;
            margin-right: 8px;
            transform: scale(1.2); /* 少し大きく */
        }

        .btn-submit {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #c82333;
        }

        .support-tabs {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 24px auto 0;
            padding: 0 4px;
        }

        .support-tab-btn {
            border: 1px solid #ccc;
            background: #f8f9fa;
            color: #333;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .support-tab-btn.active {
            background: #0d6efd;
            color: #fff;
            border-color: #0d6efd;
        }

        .support-tab-panel {
            display: none;
        }

        .support-tab-panel.active {
            display: block;
        }

        .support-history-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin: 20px auto 40px;
        }

        .support-ticket-card {
            border: 1px solid #ddd;
            border-left: 5px solid #6c757d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fff;
        }

        .support-ticket-card.status-open { border-left-color: #dc3545; background: #fff5f5; }
        .support-ticket-card.status-verifying { border-left-color: #ffc107; background: #fff; }
        .support-ticket-card.status-resolved { border-left-color: #28a745; background: #f4fff6; }

        .support-ticket-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .support-ticket-detail {
            white-space: pre-wrap;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 8px;
            margin-top: 6px;
            font-size: 0.95rem;
        }

        .history-list {
            margin-top: 8px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            background: #fff;
            max-height: 160px;
            overflow-y: auto;
        }

        .history-row {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .history-row:last-child {
            border-bottom: none;
        }

        /* 添付: クリック選択 + ドラッグ＆ドロップ */
        .support-dropzone {
            position: relative;
            min-height: 120px;
            border: 2px dashed #ced4da;
            border-radius: 8px;
            background: #fafafa;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .support-dropzone.support-dropzone--over {
            border-color: #0d6efd;
            background: #e7f1ff;
            box-shadow: inset 0 0 0 1px rgba(13, 110, 253, 0.25);
        }

        .support-attachments-native {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .support-dropzone-inner {
            padding: 20px 16px;
            text-align: center;
        }

        .support-dropzone-lead {
            margin: 0;
            font-size: 0.95rem;
            color: #444;
            line-height: 1.6;
        }

        .support-dropzone-browse {
            background: none;
            border: none;
            padding: 0;
            color: #0d6efd;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
            font-size: inherit;
            font-family: inherit;
        }

        .support-dropzone-browse:hover {
            color: #0a58ca;
        }

        .support-dropzone-browse:focus-visible {
            outline: 2px solid #0d6efd;
            outline-offset: 2px;
        }

        .support-dropzone-or {
            color: #555;
        }

        .support-dropzone-files {
            display: none;
            margin: 12px 0 0;
            font-size: 0.85rem;
            color: #333;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <nav class="global-nav">
        <a href="products.html" class="nav-logo">
            <span>🚀 WEB受注システム</span>
        </a>
        <div class="nav-links">
            <a href="announcements.html" class="nav-item" data-feature="announcements">お知らせ</a>
            <a href="products.html" class="nav-item">商品一覧</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">💰 空カートリッジ買取</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">🛒 カート</a>
            <a href="support.html" class="nav-item" style="color: #ffc107; border-bottom: 2px solid #ffc107;" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" style="background-color:#28a745; color:white;" data-feature="collection">♻️ 回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn" style="color:#ff6b6b;">ログアウト</a>
        </div>
    </nav>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 20px; margin-top: 20px;">⚠️ サポート・不具合申請</h1>

        <div class="support-tabs">
            <button type="button" class="support-tab-btn active" data-tab="support-form-panel">✉️ 申請フォーム</button>
            <button type="button" class="support-tab-btn" data-tab="support-history-panel">📋 問い合わせ履歴</button>
        </div>

        <section id="support-form-panel" class="support-tab-panel active">
            <div class="support-form-container">
                <p style="margin-bottom: 20px; color: #666;">
                    システムや商品に関する不具合はこちらからご報告ください。<br>
                    管理者に直接通知が届きます。
                </p>

                <form id="support-form">
                    <div class="form-group">
                        <label>報告の種類 <span style="color:red">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="category" value="support" checked>
                                ✉️ 通常のお問い合わせ
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="category" value="bug">
                                🐛 システム不具合
                            </label>
                        </div>
                        <p style="font-size: 0.85em; color: #666; margin-top: 5px; margin-left: 5px;">
                            ※ エラーや画面停止などは「システム不具合」を選んでください。
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="order-id">対象の注文ID (任意)</label>
                        <input type="text" id="order-id" placeholder="自動入力、または空欄でも可">
                    </div>

                    <div class="form-group">
                        <label for="support-type">申請項目 <span style="color:red">*</span></label>
                        <select id="support-type" required>
                            <option value="">選択してください</option>
                            <option value="初期不良・破損">商品の初期不良・破損</option>
                            <option value="誤発送・不足">商品の誤発送・不足</option>
                            <option value="見積依頼">見積依頼</option>
                            <option value="操作方法の質問">操作方法がわからない</option>
                            <option value="システムエラー">システムのエラー・不具合</option>
                            <option value="その他">その他のお問い合わせ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="support-detail">詳細内容 <span style="color:red">*</span></label>
                        <textarea id="support-detail" rows="5" placeholder="具体的な状況をご記入ください..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label id="support-attach-label" for="support-attachments-browse">データ添付（任意・最大5ファイル・各10MBまで）</label>
                        <div id="support-dropzone" class="support-dropzone" role="region" aria-labelledby="support-attach-label">
                            <input type="file" id="support-attachments" name="attachments" class="support-attachments-native" multiple
                                accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.txt,.csv,.doc,.docx,.xls,.xlsx,.zip,application/pdf,image/*"
                                tabindex="-1" aria-hidden="true">
                            <div class="support-dropzone-inner">
                                <p class="support-dropzone-lead">
                                    <button type="button" id="support-attachments-browse" class="support-dropzone-browse">ファイルを選択</button>
                                    <span class="support-dropzone-or">／ この枠内にドラッグ＆ドロップ</span>
                                </p>
                                <p id="support-attachment-names" class="support-dropzone-files" aria-live="polite"></p>
                            </div>
                        </div>
                        <p style="font-size: 0.85em; color: #666; margin-top: 6px;">
                            PDF・画像・Word/Excel・zip など。実行ファイル（.exe 等）はアップロードできません。
                        </p>
                    </div>

                    <button type="submit" class="btn-submit">申請を送信する</button>
                </form>
                <div id="status-message" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
            </div>
        </section>

        <section id="support-history-panel" class="support-tab-panel">
            <div class="support-history-container">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px;">
                    <h2 style="margin:0;">📋 あなたの問い合わせ履歴</h2>
                    <button id="refresh-my-tickets" type="button" style="padding:8px 12px; border:1px solid #ccc; background:#f8f9fa; border-radius:4px; cursor:pointer;">更新</button>
                </div>
                <p style="margin:0 0 12px; color:#666; font-size:0.92rem;">
                    申請した内容と、管理者の対応履歴を確認できます。
                </p>
                <div id="my-support-tickets">
                    <p style="color:#666;">読み込み中...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    <script src="support.js"></script>
</body>

</html>
