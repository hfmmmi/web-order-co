<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サポート申請 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 商品一覧ページと同系の背景・コンテナ（ニュートラル配色） */
        body.support-page {
            background-color: #eef1f5;
        }

        body.support-page .container {
            background: #fff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            padding-top: 0;
        }

        body.support-page .container > h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .support-form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: 20px auto 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-submit {
            background-color: #D6E7F1;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-size: 1.05em;
            font-weight: 600;
            border-radius: 4px;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s;
        }

        .btn-submit:hover {
            background-color: #c4d9e8;
            border-color: #d1d5db;
            color: #374151;
        }

        /* 商品一覧の .product-tabs / .product-tab と同系：行中央にタブを配置 */
        .support-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            justify-content: center;
            max-width: 100%;
            margin: 24px auto 0;
            padding: 0;
            border-bottom: 2px solid #e5e7eb;
        }

        .support-tab-btn {
            padding: 12px 20px;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #374151;
            border-radius: 0;
            margin-bottom: -2px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .support-tab-btn:hover {
            background: #f9fafb;
        }

        .support-tab-btn.active {
            background: #DFE3E6;
            color: #111827;
            border-color: #d1d5db;
        }

        .support-tab-panel {
            display: none;
        }

        .support-tab-panel.active {
            display: block;
        }

        .support-history-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: 20px auto 40px;
        }

        .support-ticket-card {
            border: 1px solid #e5e7eb;
            border-left: 4px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fff;
        }

        /* 申請フォームと同系（#D6E7F1 / グレー階調。強い赤黄緑は使わない） */
        .support-ticket-card.status-open {
            border-left-color: #7eb0c9;
            background: #f0f7fb;
        }

        .support-ticket-card.status-verifying {
            border-left-color: #94a3b8;
            background: #f9fafb;
        }

        .support-ticket-card.status-resolved {
            border-left-color: #9ca3af;
            background: #f3f4f6;
        }

        .support-ticket-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .support-ticket-detail {
            white-space: pre-wrap;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 8px;
            margin-top: 6px;
            font-size: 0.95rem;
            color: #374151;
        }

        .history-list {
            margin-top: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
            max-height: 160px;
            overflow-y: auto;
        }

        .history-row {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.9rem;
            color: #374151;
        }

        .history-row:last-child {
            border-bottom: none;
        }

        /* 添付: クリック選択 + ドラッグ＆ドロップ */
        .support-dropzone {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background: #f9fafb;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .support-dropzone.support-dropzone--over {
            border-color: #374151;
            background: #f3f4f6;
            box-shadow: inset 0 0 0 1px rgba(55, 65, 81, 0.2);
        }

        .support-attachments-native {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .support-dropzone-inner {
            box-sizing: border-box;
            width: 100%;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .support-dropzone-lead {
            margin: 0;
            font-size: 0.95rem;
            color: #374151;
            line-height: 1.6;
            text-align: center;
        }

        .support-dropzone-browse {
            background: none;
            border: none;
            padding: 0;
            color: #374151;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            font-size: inherit;
            font-family: inherit;
        }

        .support-dropzone-browse:hover {
            color: #1f2937;
        }

        .support-dropzone-browse:focus-visible {
            outline: 2px solid #374151;
            outline-offset: 2px;
        }

        .support-dropzone-or {
            color: #6b7280;
        }

        .support-dropzone-files {
            display: none;
            margin: 12px 0 0;
            font-size: 0.85rem;
            color: #374151;
            text-align: center;
            word-break: break-all;
            width: 100%;
        }

        .support-history-heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .support-refresh-btn {
            padding: 8px 14px;
            border: 1px solid #e5e7eb;
            background: #D6E7F1;
            color: #374151;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.15s, border-color 0.15s;
        }

        .support-refresh-btn:hover {
            background: #c4d9e8;
            border-color: #d1d5db;
        }

        .support-ticket-meta strong {
            color: #111827;
        }

        .support-history-empty,
        .support-history-loading {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .support-ticket-line {
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #374151;
        }

        .support-ticket-line--muted {
            font-size: 0.88rem;
            color: #6b7280;
        }

        .support-ticket-section-title {
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #111827;
        }

        .support-ticket-attach {
            margin-top: 8px;
            font-size: 0.88rem;
            color: #374151;
        }

        .support-ticket-attach a {
            color: #374151;
        }

        .history-row-date {
            color: #6b7280;
            font-size: 0.8rem;
        }

        .history-row-empty {
            padding: 8px;
            color: #6b7280;
            font-size: 0.88rem;
        }
    </style>
</head>

<body class="support-page">

    <nav class="global-nav">
        <a href="home.html" class="nav-logo">
            <span>発注システム</span>
        </a>
        <div class="nav-links">
            <a href="home.html" class="nav-item nav-home-link" aria-label="ホーム" title="ホーム"><svg class="nav-home-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="products.html" class="nav-item">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item nav-item--current" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>
    <div class="container">
        <h1 style="text-align: center; color: #111827;">サポート・不具合申請</h1>

        <div class="support-tabs">
            <button type="button" class="support-tab-btn active" data-tab="support-form-panel">申請フォーム</button>
            <button type="button" class="support-tab-btn" data-tab="support-history-panel">問い合わせ履歴</button>
        </div>

        <section id="support-form-panel" class="support-tab-panel active">
            <div class="support-form-container">
                <p style="margin-bottom: 20px; color: #6b7280;">
                    システムや商品に関する不具合はこちらからご報告ください。<br>
                    管理者に直接通知が届きます。
                </p>

                <form id="support-form">
                    <div class="form-group">
                        <label for="support-type">申請項目 <span style="color:red">*</span></label>
                        <select id="support-type" required>
                            <option value="">選択してください</option>
                            <option value="初期不良・破損">商品の初期不良・破損</option>
                            <option value="誤発送・不足">商品の誤発送・不足</option>
                            <option value="見積依頼">見積依頼</option>
                            <option value="操作方法の質問">操作方法がわからない</option>
                            <option value="システムエラー">システムのエラー・不具合</option>
                            <option value="その他">その他のお問い合わせ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="order-id">対象の注文ID</label>
                        <input type="text" id="order-id">
                    </div>

                    <div class="form-group">
                        <label for="support-detail">内容 <span style="color:red">*</span></label>
                        <textarea id="support-detail" rows="5" required></textarea>
                    </div>

                    <div class="form-group">
                        <label id="support-attach-label" for="support-attachments-browse">データ添付（最大5ファイル・各10MBまで）</label>
                        <div id="support-dropzone" class="support-dropzone" role="region" aria-labelledby="support-attach-label">
                            <input type="file" id="support-attachments" name="attachments" class="support-attachments-native" multiple
                                accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.txt,.csv,.doc,.docx,.xls,.xlsx,.zip,application/pdf,image/*"
                                tabindex="-1" aria-hidden="true">
                            <div class="support-dropzone-inner">
                                <p class="support-dropzone-lead">
                                    <button type="button" id="support-attachments-browse" class="support-dropzone-browse">ファイルを選択</button>
                                    <span class="support-dropzone-or"> / 枠内にドラッグ＆ドロップ</span>
                                </p>
                                <p id="support-attachment-names" class="support-dropzone-files" aria-live="polite"></p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">送信する</button>
                </form>
                <div id="status-message" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
            </div>
        </section>

        <section id="support-history-panel" class="support-tab-panel">
            <div class="support-history-container">
                <div id="my-support-tickets">
                    <p class="support-history-loading">読み込み中...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    <script src="support.js"></script>
</body>

</html>
