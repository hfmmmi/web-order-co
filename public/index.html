<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>発注システム ログイン</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="body-login"> 
        <div class="login-container">
            <h1>発注システム</h1>

            <div id="session-expired-notice" class="login-session-notice" role="status" hidden>
                <p class="login-session-notice-title">セッションの有効期限が切れました</p>
                <p class="login-session-notice-body">長時間の無操作、またはシステム更新によりログイン状態が解除されました。お手数ですが、再度ログインしてください。</p>
            </div>
            
            <div>
                <label>メールアドレス:</label>
                <input type="email" id="username-input" autocomplete="username">
            </div>
            
            <div>
                <label>パスワード:</label>
                <input type="password" id="password-input">
            </div>
            
            <button>ログイン</button>

            <div id="recaptcha-wrap" class="recaptcha-wrap" style="display: none; margin-top: 12px;">
                <div id="recaptcha-container"></div>
            </div>

            <div class="login-forgot-wrap">
                <a href="#" id="forgot-password-link">パスワードをお忘れの方</a>
            </div>
        </div>

        <!-- パスワード再設定申込モーダル -->
        <div id="forgot-password-modal" class="modal-overlay" role="dialog" aria-labelledby="forgot-password-title">
            <div class="modal-content" style="max-width: 400px;">
                <div class="modal-header">
                    <h2 id="forgot-password-title">パスワード再設定</h2>
                    <button type="button" class="modal-close-btn" id="forgot-password-close" aria-label="閉じる">×</button>
                </div>
                <div class="modal-body">
                    <p style="margin-bottom: 12px; font-size: 0.9em;">ご登録のメールアドレスを入力してください。パスワード再設定用のリンクをお送りします。</p>
                    <label for="forgot-password-input">メールアドレス</label>
                    <input type="email" id="forgot-password-input" placeholder="例: user@example.com" autocomplete="username">
                    <button type="button" id="forgot-password-submit" style="margin-top: 12px;">送信する</button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
