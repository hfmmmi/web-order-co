<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>納品先編集 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .account-delivery-page {
            max-width: 720px;
            margin: 0 auto;
        }
        .account-delivery-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .account-delivery-header .account-page-title {
            grid-column: 2;
            justify-self: center;
            margin: 0;
            color: #111827;
            font-size: 1.35rem;
            font-weight: normal;
            text-align: center;
        }
        .account-delivery-back {
            grid-column: 3;
            justify-self: end;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #374151;
            font-size: 0.95rem;
            font-weight: normal;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .account-delivery-back:hover {
            background: #f9fafb;
            border-color: #9ca3af;
            color: #111827;
        }
        .delivery-form-panel {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 28px;
        }
        .delivery-form-panel h2 {
            margin: 0 0 16px;
            font-size: 1.05rem;
            font-weight: normal;
            color: #111827;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .delivery-form-panel .form-group {
            margin-bottom: 15px;
        }
        .delivery-form-panel label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: normal;
        }
        .delivery-form-panel .label-hint {
            font-size: 0.82rem;
            color: #6b7280;
        }
        .delivery-form-panel input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .delivery-form-panel .zip-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .delivery-form-panel .zip-row input {
            width: 120px;
            flex: 0 0 auto;
        }
        .delivery-form-panel #delivery-zip-search-btn {
            flex: 0 0 auto;
            padding: 0 12px;
            height: 38px;
            cursor: pointer;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-weight: normal;
        }
        .delivery-form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-delivery-save {
            padding: 10px 22px;
            background: #DFE3E6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: normal;
        }
        .btn-delivery-save:hover {
            background: #d1d5db;
            border-color: #9ca3af;
        }
        .btn-delivery-save:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .delivery-history-result-info {
            margin: 0 0 8px;
            font-size: 0.9rem;
            color: #6b7280;
        }
        .delivery-history-result-info:empty {
            display: none;
        }
        .delivery-history-search-box {
            margin-bottom: 12px;
        }
        .account-delivery-page .orders-search-toolbar {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 10px;
        }
        .account-delivery-page .orders-search-toolbar__keyword {
            box-sizing: border-box;
            flex: 1 1 200px;
            min-width: 160px;
            height: 40px;
            padding: 0 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: #fff;
        }
        .account-delivery-page .orders-search-toolbar .order-search-btn {
            box-sizing: border-box;
            flex: 0 0 auto;
            height: 40px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #374151;
            font-weight: normal;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .account-delivery-page .orders-search-toolbar .order-search-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }
        #delivery-history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .delivery-history-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .delivery-history-item__name {
            flex: 1;
            min-width: 0;
            font-size: 0.95rem;
            font-weight: normal;
            color: #111827;
        }
        .btn-edit-history {
            flex: 0 0 auto;
            padding: 6px 12px;
            font-size: 0.85rem;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-weight: normal;
        }
        .btn-edit-history:hover {
            background: #f9fafb;
        }
        .delivery-history-empty {
            padding: 16px;
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        #delivery-load-status {
            text-align: center;
            color: #6b7280;
            padding: 24px;
        }
    </style>
</head>
<body>
    <nav class="global-nav">
        <a href="home.html" class="nav-logo"><span>発注システム</span></a>
        <div class="nav-links">
            <a href="home.html" class="nav-item nav-home-link" aria-label="ホーム" title="ホーム"><svg class="nav-home-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="products.html" class="nav-item">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item" data-feature="support">お問合わせ</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item nav-item--current">設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>

    <div class="container">
        <div class="account-delivery-page">
            <header class="account-delivery-header">
                <h1 class="account-page-title">納品先編集</h1>
                <a href="account.html" class="account-delivery-back">戻る</a>
            </header>

            <div id="delivery-load-status">読み込み中…</div>

            <div id="delivery-main" style="display: none;">
                <section class="delivery-form-panel" aria-labelledby="delivery-default-heading">
                    <h2 id="delivery-default-heading">納品先登録</h2>
                    <form id="delivery-form" novalidate>
                        <div class="form-group">
                            <label for="delivery-name">納品先名</label>
                            <input type="text" id="delivery-name" maxlength="100" autocomplete="organization">
                        </div>
                        <div class="form-group">
                            <label for="delivery-zip">郵便番号<span class="label-hint">　※ハイフンなし</span></label>
                            <div class="zip-row">
                                <input type="text" id="delivery-zip" maxlength="7" inputmode="numeric" autocomplete="postal-code">
                                <button type="button" id="delivery-zip-search-btn">住所検索</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="delivery-address">住所</label>
                            <input type="text" id="delivery-address" maxlength="300" autocomplete="street-address">
                        </div>
                        <div class="form-group">
                            <label for="delivery-tel">電話番号</label>
                            <input type="tel" id="delivery-tel" maxlength="30" autocomplete="tel">
                        </div>
                        <div class="delivery-form-actions">
                            <button type="submit" id="delivery-save-btn" class="btn-delivery-save">保存</button>
                        </div>
                    </form>
                </section>

                <section class="delivery-history-panel" aria-label="過去の注文で使った納品先">
                    <div id="delivery-history-result-info" class="delivery-history-result-info" role="status"></div>
                    <div id="delivery-history-search-box" class="delivery-history-search-box" hidden>
                        <div class="orders-search-toolbar">
                            <input type="text" id="delivery-history-search-input" class="orders-search-toolbar__field orders-search-toolbar__keyword"
                                aria-label="納品先を検索">
                            <button type="button" id="delivery-history-search-btn" class="order-search-btn">検索</button>
                        </div>
                    </div>
                    <div id="delivery-history-list"></div>
                    <div id="delivery-history-pagination" class="pagination-area" aria-label="ページ送り"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/account-delivery.js"></script>
</body>
</html>
