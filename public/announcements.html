<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ - WEB受注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .announcements-page {
            max-width: 800px;
            margin: 0 auto;
        }
        .announcement-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid #007bff;
        }
        .announcement-card.type-info { border-left-color: #17a2b8; }
        .announcement-card.type-warning { border-left-color: #ffc107; }
        .announcement-card.type-error { border-left-color: #dc3545; }
        .announcement-card.type-success { border-left-color: #28a745; }
        .announcement-card h3 { margin: 0 0 10px 0; font-size: 1.15rem; }
        .announcement-card .body { color: #333; line-height: 1.7; white-space: pre-wrap; }
        .announcement-card .meta { font-size: 0.85rem; color: #666; margin-top: 12px; }
        .announcement-card a { color: #007bff; text-decoration: underline; }
        .announcements-empty {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <nav class="global-nav">
        <a href="products.html" class="nav-logo">
            <span>🚀 WEB受注システム</span>
        </a>
        <div class="nav-links">
            <a href="announcements.html" class="nav-item" style="color: #ffc107; border-bottom: 2px solid #ffc107;">お知らせ</a>
            <a href="products.html" class="nav-item">商品一覧</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">💰 空カートリッジ買取</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">🛒 カート</a>
            <a href="support.html" class="nav-item" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" style="background-color:#28a745; color:white;" data-feature="collection">♻️ 回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn" style="color:#ff6b6b;">ログアウト</a>
        </div>
    </nav>

    <div class="container">
        <div class="announcements-page">
            <header style="margin-bottom: 24px;">
                <h1 style="margin: 0;">お知らせ</h1>
                <p style="color: #666; margin-top: 8px;">会社からのお知らせやニュースを掲載しています。</p>
            </header>

            <div id="announcements-list">
                <p style="text-align: center; color: #999;">読み込み中...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/announcements.js"></script>
</body>

</html>
