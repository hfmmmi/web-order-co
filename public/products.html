<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 受注管理ページ（admin-orders）と同系のニュートラル配色 */
        body.products-page {
            background-color: #eef1f5;
        }

        body.products-page .container {
            background: #fff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .product-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            flex-wrap: wrap;
            align-items: flex-end;
            position: sticky;
            top: var(--products-global-nav-offset, 72px);
            z-index: 900;
            padding: 4px 0 0;
            background: #fff;
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.06);
        }

        .product-tabs__pricelist {
            margin-left: auto;
            margin-bottom: 4px;
            padding: 10px 18px;
            font-size: 0.95rem;
            border-radius: 0;
        }

        .product-tab:not(.active) {
            color: #9ca3af;
        }

        .product-tab {
            padding: 12px 20px;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #111827;
            font-weight: normal;
            cursor: pointer;
            border-radius: 0;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            margin-bottom: -2px;
            font-size: 0.95rem;
        }

        .product-tab:hover {
            background: #f9fafb;
        }

        .product-tab.active {
            background: #DFE3E6;
            color: #111827;
            border-color: #d1d5db;
        }

        .estimate-order-panel {
            display: none;
            margin-bottom: 16px;
            padding: 16px 18px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        .estimate-order-panel.is-active {
            display: block;
        }

        .estimate-order-panel__row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .estimate-order-panel__row label {
            font-size: 0.9rem;
            color: #374151;
        }

        #estimate-tab-input,
        #estimate-tab-load-btn {
            box-sizing: border-box;
            height: 38px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        #estimate-tab-input {
            flex: 1;
            min-width: 160px;
            max-width: 320px;
            padding: 0 10px;
            color: #111827;
            background: #fff;
        }

        #estimate-tab-input:focus {
            border-color: #9ca3af;
            outline: none;
            box-shadow: 0 0 0 2px rgba(55, 65, 81, 0.12);
        }

        #estimate-tab-load-btn {
            flex-shrink: 0;
            padding: 0 18px;
            background: #fff;
            color: #374151;
            cursor: pointer;
            font-weight: normal;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #estimate-tab-load-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        body.products-page .products-search-bar {
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 16px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-sizing: border-box;
        }

        body.products-page .products-search-bar.is-visible {
            display: flex;
        }

        body.products-page .products-search-bar__input {
            flex: 1;
            min-width: 0;
            max-width: 520px;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            font-weight: 400;
            color: #111827;
            font-family: inherit;
        }

        body.products-page .products-search-bar__input:focus {
            border-color: #9ca3af;
            outline: none;
            box-shadow: 0 0 0 2px rgba(55, 65, 81, 0.12);
        }

        body.products-page .products-search-bar__btn {
            flex-shrink: 0;
            padding: 10px 20px;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 400;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.products-page .products-search-bar__btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .estimate-order-panel__hint {
            margin: 0;
            font-size: 0.8rem;
            color: #6b7280;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .product-frequent-count {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
            font-weight: normal;
        }

        /* 見積モード時のバナー */
        .estimate-mode-banner {
            background-color: #f9fafb;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .estimate-mode-banner__title {
            color: #111827;
            font-weight: normal;
        }

        .estimate-banner-clear {
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: normal;
        }

        .estimate-banner-clear:hover {
            background: #f9fafb;
        }

        body.products-page #search-result-info {
            color: #374151;
        }

        body.products-page .product-table th {
            background-color: #f9fafb;
            color: #374151;
            border: 1px solid #e5e7eb;
            font-weight: normal;
        }

        body.products-page .product-table td {
            border: 1px solid #e5e7eb;
            font-weight: normal;
        }

        body.products-page .product-name-cell__title {
            font-weight: 600;
        }

        body.products-page .product-table tr:nth-child(even) {
            background-color: #fafafa;
        }

        body.products-page .global-nav .nav-logo,
        body.products-page .global-nav .nav-item {
            font-weight: normal;
        }

        body.products-page .stock-qty {
            font-weight: normal;
        }

        body.products-page .btn-download-hero {
            font-weight: normal;
            border-radius: 0;
        }

        body.products-page .pagination-area .product-pagination__page,
        body.products-page .pagination-area .product-pagination__page.is-current,
        body.products-page .pagination-area .product-pagination__nav,
        body.products-page .pagination-area .product-pagination__nav-icon {
            font-weight: normal;
        }
    </style>
</head>

<body class="products-page">
    <nav class="global-nav">
        <a href="home.html" class="nav-logo">
            <span>発注システム</span>
        </a>
        <div class="nav-links">
            <a href="home.html" class="nav-item nav-home-link" aria-label="ホーム" title="ホーム"><svg class="nav-home-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="products.html" class="nav-item nav-item--current">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item" data-feature="support">お問合わせ</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item">設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>

    <div class="container">

        <div class="product-tabs">
            <button type="button" class="product-tab active" data-tab="all">全商品</button>
            <button type="button" class="product-tab" data-tab="frequent">よく注文する商品</button>
            <button type="button" class="product-tab" data-tab="favorites">お気に入り</button>
            <button type="button" class="product-tab" data-tab="estimate-order">見積書から注文</button>
            <a href="pricelist-view.html" target="_blank" rel="noopener noreferrer" class="btn-download-hero product-tabs__pricelist">価格表を開く</a>
        </div>

        <div id="products-all-search-bar" class="products-search-bar" aria-hidden="true">
            <input type="text" id="search-input" class="products-search-bar__input" aria-label="商品を検索">
            <button type="button" id="search-btn" class="products-search-bar__btn">検索</button>
        </div>

        <div id="estimate-order-panel" class="estimate-order-panel" aria-hidden="true">
            <div class="estimate-order-panel__row">
                <label for="estimate-tab-input">見積No.</label>
                <input type="text" id="estimate-tab-input" autocomplete="off" maxlength="64">
                <button type="button" id="estimate-tab-load-btn">読込</button>
                <span class="estimate-order-panel__hint">　※有効期限内の見積書のみ</span>
            </div>
        </div>

        <div id="estimate-mode-banner" class="estimate-mode-banner">
            <div style="flex-grow: 1;">
                <span class="estimate-mode-banner__title">見積番号 <span id="current-estimate-id"></span> の内容を表示中</span>
                <span id="current-estimate-subject" style="margin-left: 15px; color: #4b5563; font-weight: normal;"></span><br>
                <small style="color: #6b7280;">※ここに表示されている価格は、この見積限定の特別価格です。</small>
                <small id="current-estimate-valid" style="margin-left: 15px; color: #b91c1c; font-weight: normal;"></small>
            </div>
            <button type="button" id="clear-estimate-btn" class="estimate-banner-clear">通常一覧に戻る</button>
        </div>

        <div id="search-result-info" style="margin-bottom: 15px; font-weight: normal; font-size: 1rem; padding-left: 5px;">
        </div>

        <div class="table-container">
            <table class="product-table">
                <thead>
                    <tr>
                        <th style="width: 110px;">メーカー</th>
                        <th style="min-width: 200px;">商品名</th>
                        <th style="width: 100px;">商品コード</th>
                        <th style="width: 58px;">仕様</th>
                        <th style="width: 76px;">価格</th>
                        <th style="width: 88px;">在庫</th>
                        <th style="width: 178px; min-width: 178px;">発注</th>
                    </tr>
                </thead>
                <tbody id="product-list-body">
                </tbody>
            </table>
        </div>

        <div id="pagination-container" class="pagination-area"></div>
    </div>

    <script src="script.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
