<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品一覧 - WEB受注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 見積検索用の追加スタイル */
        .estimate-section {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #90caf9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .estimate-label {
            font-weight: bold;
            color: #0d47a1;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .estimate-input-group {
            display: flex;
            gap: 5px;
            flex-grow: 1;
            max-width: 400px;
        }
        
        /* 見積モード時のバナー */
        .estimate-mode-banner {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none; /* デフォルト非表示 */
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="global-nav">
        <a href="products.html" class="nav-logo">
            <span>🚀 WEB受注システム</span>
        </a>
        <div class="nav-links">
            <a href="announcements.html" class="nav-item" data-feature="announcements">お知らせ</a>
            <a href="products.html" class="nav-item" style="color: #ffc107; border-bottom: 2px solid #ffc107;">商品一覧</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">💰 空カートリッジ買取</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">🛒 カート</a>
            <a href="support.html" class="nav-item" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" style="background-color:#28a745; color:white;" data-feature="collection">♻️
                回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn" style="color:#ff6b6b;">ログアウト</a>
        </div>
    </nav>

    <div class="container">
        
        <div class="estimate-section">
            <div class="estimate-label">
                <span>📑 お見積りをお持ちの方</span>
            </div>
            <div class="estimate-input-group">
                <input type="text" id="estimate-input" placeholder="見積番号を入力 (例: 15936)" style="padding: 8px; flex-grow: 1; border: 1px solid #ccc; border-radius: 4px;">
                <button id="estimate-search-btn" style="background: #0d47a1; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">呼び出し</button>
            </div>
            <div style="font-size: 0.8rem; color: #555;">
                ※有効期限内の見積のみ表示されます
            </div>
        </div>

        <!-- ★タブ切り替えUI -->
        <div class="product-tabs" style="display: flex; gap: 0; margin-bottom: 15px; border-bottom: 2px solid #dee2e6;">
            <button class="product-tab active" data-tab="all" style="padding: 12px 24px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s;">
                📦 全商品
            </button>
            <button class="product-tab" data-tab="frequent" style="padding: 12px 24px; border: none; background: #e9ecef; color: #495057; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s;">
                🔥 よく注文する商品
            </button>
            <button class="product-tab" data-tab="favorites" style="padding: 12px 24px; border: none; background: #e9ecef; color: #495057; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.2s;">
                ⭐ お気に入り
            </button>
        </div>

        <div class="control-panel">
            <div class="search-hero-box">
                <div class="input-with-clear" style="flex-grow: 1;">
                    <input type="text" id="search-input" placeholder="商品名、型番、メーカーで検索..." autocomplete="off">
                    <span class="clear-input-btn" onclick="document.getElementById('search-input').value=''; document.getElementById('search-input').focus();">×</span>
                </div>
                <button id="search-btn">🔍 検索</button>
            </div>

            <a href="/download-my-pricelist" class="btn-download-hero">
                📥 価格表をダウンロード
            </a>
        </div>

        <div id="estimate-mode-banner" class="estimate-mode-banner">
            <div style="flex-grow: 1;">
                <strong>📑 見積番号 <span id="current-estimate-id"></span> の内容を表示中</strong>
                <span id="current-estimate-subject" style="margin-left: 15px; color: #6a5a00; font-weight: bold;"></span><br>
                <small>※ここに表示されている価格は、この見積限定の特別価格です。</small>
                <small id="current-estimate-valid" style="margin-left: 15px; color: #d32f2f; font-weight: bold;"></small>
            </div>
            <button id="clear-estimate-btn" style="background: #856404; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">通常一覧に戻る</button>
        </div>

        <div id="search-result-info" style="margin-bottom: 15px; font-weight: bold; color: #555; font-size: 1rem; padding-left: 5px;">
        </div>

        <div class="table-container">
            <table class="product-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">区分</th>
                        <th style="min-width: 220px;">商品名 / 備考</th>
                        <th style="width: 100px;">価格</th>
                        <th style="width: 140px;">在庫</th>
                        <th style="width: 150px;">発注</th>
                    </tr>
                </thead>
                <tbody id="product-list-body">
                </tbody>
            </table>
        </div>

        <div id="pagination-container" class="pagination-area"></div>
    </div>

    <script src="script.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
