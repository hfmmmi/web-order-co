<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>価格表一覧 - WEB受注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.pricelist-view-page {
            background-color: #eef1f5;
            margin: 0;
            font-family: sans-serif;
        }

        body.pricelist-view-page .container {
            width: 94%;
            max-width: 1320px;
            margin: 20px auto;
            background: #fff;
            padding: 20px 22px 28px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.pricelist-view-page h1 {
            text-align: left;
            font-size: 1.35rem;
            font-weight: 700;
            color: #374151;
            margin: 0 0 8px 0;
        }

        body.pricelist-view-page .pricelist-meta {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 16px;
        }

        body.pricelist-view-page .pricelist-back {
            display: inline-block;
            margin-bottom: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
            text-decoration: none;
            border: 1px solid #d1d5db;
            padding: 6px 12px;
            border-radius: 6px;
            background: #fff;
        }

        body.pricelist-view-page .pricelist-back:hover {
            background: #f9fafb;
        }

        body.pricelist-view-page #pricelist-status {
            padding: 24px;
            text-align: center;
            color: #6b7280;
        }

        body.pricelist-view-page #pricelist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        body.pricelist-view-page #pricelist-table th,
        body.pricelist-view-page #pricelist-table td {
            border: 1px solid #e5e7eb;
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }

        body.pricelist-view-page #pricelist-table th {
            background: #f9fafb;
            color: #374151;
            font-weight: 700;
            white-space: nowrap;
        }

        body.pricelist-view-page #pricelist-table tbody tr:nth-child(even) {
            background: #fafafa;
        }

        @media (max-width: 640px) {
            body.pricelist-view-page .container {
                width: 100%;
                max-width: none;
                margin: 12px 0;
                padding: 16px 14px;
                border-radius: 0;
            }
        }
    </style>
</head>

<body class="pricelist-view-page">
    <div class="container">
        <a class="pricelist-back" href="products.html">商品一覧へ戻る</a>
        <h1>価格表一覧</h1>
        <p class="pricelist-meta">貴社ランク適用後の提供価格です（<span id="pricelist-count">0</span> 件）。</p>

        <div id="pricelist-status">読み込み中です…</div>

        <table id="pricelist-table" style="display: none;">
            <thead>
                <tr>
                    <th>商品コード</th>
                    <th>商品名</th>
                    <th>メーカー</th>
                    <th>規格</th>
                    <th>貴社提供価格</th>
                </tr>
            </thead>
            <tbody id="pricelist-table-body"></tbody>
        </table>
    </div>

    <script src="js/pricelist-view.js"></script>
</body>

</html>
