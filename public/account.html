<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .account-settings-page {
            max-width: 720px;
            margin: 0 auto;
        }
        .account-page-title {
            margin: 0 0 20px 0;
            color: #111827;
            font-size: 1.35rem;
            font-weight: normal;
        }
        .account-settings-links {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin: 0;
        }
        .account-settings-link {
            display: block;
            box-sizing: border-box;
            width: 100%;
            padding: 14px 18px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            color: #111827;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            text-align: left;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .account-settings-link:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }
        @media (max-width: 560px) {
            .account-settings-links {
                grid-template-columns: 1fr;
            }
        }
        .account-users-panel {
            margin-top: 28px;
            padding: 20px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        .account-users-panel h2 {
            margin: 0 0 8px;
            font-size: 1.05rem;
            font-weight: normal;
            color: #111827;
        }
        .account-users-panel .au-lead {
            margin: 0 0 16px;
            font-size: 0.9rem;
            color: #6b7280;
            line-height: 1.5;
        }
        .account-users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .account-users-table th,
        .account-users-table td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: left;
            background: #fff;
        }
        .account-users-table select {
            width: 100%;
            max-width: 7.5rem;
            padding: 6px 8px;
            font-size: 0.875rem;
            box-sizing: border-box;
        }
        .account-users-form {
            display: grid;
            gap: 10px;
            margin-top: 16px;
            max-width: 520px;
        }
        .account-users-form label {
            display: block;
            font-size: 0.88rem;
            color: #374151;
            margin-bottom: 4px;
        }
        .account-users-form input,
        .account-users-form select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        .account-users-form button {
            justify-self: start;
            padding: 10px 20px;
            border: 1px solid #2563eb;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .account-users-form button:hover:not(:disabled) {
            background: #1d4ed8;
        }
        .account-users-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .au-deactivate-btn {
            padding: 4px 10px;
            font-size: 0.82rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }
        .au-empty {
            font-size: 0.9rem;
            color: #6b7280;
        }
        #au-denied {
            margin-top: 20px;
            padding: 14px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #991b1b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="global-nav">
        <a href="home.html" class="nav-logo"><span>発注システム</span></a>
        <div class="nav-links">
            <a href="home.html" class="nav-item nav-home-link" aria-label="ホーム" title="ホーム"><svg class="nav-home-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="products.html" class="nav-item">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item" data-feature="support">お問合わせ</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item nav-item--current">設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>

    <div class="container">
        <div class="account-settings-page">
            <header>
                <h1 class="account-page-title">設定</h1>
            </header>

            <nav class="account-settings-links" aria-label="設定メニュー">
                <a href="account-delivery.html" class="account-settings-link">納品先編集</a>
                <a href="account-profile.html" class="account-settings-link">アカウント設定</a>
                <a href="#account-users" class="account-settings-link" id="account-users-link" style="display:none;">ユーザーアカウント</a>
            </nav>

            <p id="au-denied" hidden>ユーザーアカウントの追加・管理は、企業管理者（または代理ログイン中の受注管理者）のみ利用できます。</p>

            <section id="account-users-section" class="account-users-panel" hidden>
                <div id="au-content" hidden>
                    <h2 id="account-users">ユーザーアカウント</h2>
                    <p class="au-lead">同じ会社の発注担当者を追加できます。ログインIDはメールアドレスです。</p>
                    <div id="au-list" aria-live="polite"></div>

                    <h3 style="font-size:1rem; font-weight:normal; margin:24px 0 8px;">アカウント追加</h3>
                    <div class="account-users-form">
                        <div>
                            <label for="au-email">メールアドレス（ログインID）<span style="color:#dc2626;">*</span></label>
                            <input type="email" id="au-email" autocomplete="off" placeholder="例: tanaka@example.com">
                        </div>
                        <div>
                            <label for="au-display-name">表示名</label>
                            <input type="text" id="au-display-name" maxlength="100" placeholder="例: 田中 太郎">
                        </div>
                        <div>
                            <label for="au-role">権限</label>
                            <select id="au-role">
                                <option value="user">一般（発注のみ）</option>
                                <option value="admin">企業管理者（ユーザー追加可）</option>
                            </select>
                        </div>
                        <div>
                            <label for="au-password">初期パスワード<span style="color:#dc2626;">*</span></label>
                            <input type="text" id="au-password" autocomplete="new-password" placeholder="4文字以上">
                        </div>
                        <button type="button" id="au-add-btn">アカウントを追加</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/account-users.js"></script>
</body>
</html>
