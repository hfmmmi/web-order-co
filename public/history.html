<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文履歴 - WEB受注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 商品一覧ページと同系のニュートラル配色 */
        body.history-page {
            background-color: #eef1f5;
        }

        body.history-page .container {
            background: #fff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.history-page .history-page-title {
            margin: 0 0 4px 0;
            color: #111827;
            font-size: 1.35rem;
        }

        body.history-page .search-area {
            background: #f9fafb;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            align-items: stretch;
            flex-wrap: nowrap;
            min-width: 0;
        }

        body.history-page .search-area input {
            flex: 1 1 0;
            min-width: 0;
            width: 0;
            padding: 8px 10px;
            font-size: clamp(0.8rem, 0.35vw + 0.78rem, 0.95rem);
            border: 1px solid #d1d5db;
            border-radius: 6px;
            color: #111827;
            box-sizing: border-box;
            white-space: nowrap;
            overflow-x: auto;
        }

        body.history-page .search-area input:focus {
            border-color: #9ca3af;
            outline: none;
            box-shadow: 0 0 0 2px rgba(55, 65, 81, 0.12);
        }

        body.history-page .search-area button {
            flex-shrink: 0;
            width: auto;
            min-width: 4.25rem;
            padding: 8px 14px;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-weight: 600;
            font-size: clamp(0.8rem, 0.35vw + 0.78rem, 0.95rem);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            align-self: stretch;
        }

        body.history-page .search-area button:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        body.history-page .history-loading,
        body.history-page .history-empty {
            text-align: center;
            color: #6b7280;
            padding: 1rem;
        }

        body.history-page .history-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.history-page .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        body.history-page .btn-toggle-detail {
            cursor: pointer;
            padding: 6px 12px;
            background: #dfe3e6;
            color: #111827;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        body.history-page .btn-toggle-detail:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        body.history-page .btn-toggle-detail.is-open {
            background: #fff;
            color: #374151;
            border-color: #d1d5db;
        }

        body.history-page .btn-reorder {
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        body.history-page .btn-reorder:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        body.history-page .history-support-link {
            text-decoration: none;
            color: #374151;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid transparent;
        }

        body.history-page .history-support-link:hover {
            color: #111827;
            border-bottom-color: #d1d5db;
        }

        body.history-page .history-detail-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e5e7eb;
        }

        body.history-page .history-error {
            color: #b91c1c;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>

<body class="history-page">
    <nav class="global-nav">
        <a href="products.html" class="nav-logo">
            <span>WEB受注システム</span>
        </a>
        <div class="nav-links">
            <a href="announcements.html" class="nav-item" data-feature="announcements">お知らせ</a>
            <a href="products.html" class="nav-item">商品一覧</a>
            <a href="history.html" class="nav-item nav-item--current" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="support.html" class="nav-item" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>
    <div class="container">
        <header style="margin-bottom: 20px;">
            <h1 class="history-page-title">注文履歴・配送状況</h1>
        </header>

        <div class="search-area">
            <input type="text" id="history-search-input" placeholder="商品名、注文ID、備考などで検索...">
            <button type="button" id="history-search-btn">検索</button>
        </div>

        <div id="history-list-container">
            <p class="history-loading">履歴を読み込んでいます...</p>
        </div>

        <div id="pagination-container" class="pagination-area" aria-label="ページ送り"></div>
    </div>

    <script src="script.js"></script>
    <script src="history.js"></script>
</body>

</html>
