<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>注文詳細 - 発注システム</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .admin-layout-wrapper {
            display: flex;
            height: 100vh;
        }

        .admin-main-content {
            flex-grow: 1;
            background: #eef1f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
        }

        .page-header {
            margin-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 12px;
        }

        .page-header-leading {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-header-leading h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #374151;
        }

        .page-header-toolbar-btn {
            box-sizing: border-box;
            width: max-content;
            white-space: nowrap;
            padding: 8px 10px;
            cursor: pointer;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 0;
            font-weight: 600;
            font-size: inherit;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .page-header-toolbar-btn:hover {
            background: #f9fafb;
        }

        .admin-main-scroll {
            overflow: auto;
            flex: 1;
            min-height: 0;
        }

        .admin-order-detail-meta {
            margin: 6px 0 0 0;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .admin-order-detail-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            max-width: 960px;
        }

        #admin-order-detail-status {
            color: #6b7280;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="admin-layout-wrapper">
        <aside class="admin-sidebar"></aside>

        <main class="admin-main-content">
            <div class="page-header">
                <div class="page-header-leading">
                    <h2><span class="admin-page-icon" data-admin-icon="orders" aria-hidden="true"></span>注文詳細</h2>
                    <div class="page-header-inline-actions">
                        <a href="admin-orders.html" class="page-header-toolbar-btn">受注管理に戻る</a>
                    </div>
                </div>
                <p id="admin-order-detail-meta" class="admin-order-detail-meta"></p>
            </div>

            <div class="admin-main-scroll">
                <div id="admin-order-detail-status">データを読み込み中…</div>
                <div id="admin-order-detail-body" class="admin-order-detail-card" style="display: none;"></div>
            </div>
        </main>
    </div>

    <script src="../js/admin-icons.js"></script>
    <script src="../js/admin-common.js"></script>
    <script src="../js/admin-orders-view.js?v=8.7.0"></script>
    <script src="../js/admin-order-detail.js"></script>
</body>

</html>
