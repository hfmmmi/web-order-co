<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント設定 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .account-profile-page {
            max-width: 560px;
            margin: 0 auto;
        }
        .account-profile-header {
            margin-bottom: 8px;
        }
        .account-profile-header .account-page-title {
            margin: 0;
            color: #111827;
            font-size: 1.35rem;
            font-weight: normal;
        }
        .profile-form-panel {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        .profile-form-panel h2 {
            margin: 0 0 16px;
            font-size: 1.05rem;
            font-weight: normal;
            color: #111827;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .profile-form-panel .form-group {
            margin-bottom: 15px;
        }
        .profile-form-panel label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: normal;
        }
        .profile-form-panel .label-hint {
            font-size: 0.82rem;
            color: #6b7280;
        }
        .profile-form-panel input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .profile-form-panel input[readonly] {
            background: #f3f4f6;
            color: #6b7280;
        }
        .profile-form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-profile-save {
            padding: 10px 22px;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-profile-save:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }
        .btn-profile-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #profile-load-status {
            text-align: center;
            color: #6b7280;
            padding: 24px;
        }
        .profile-note {
            margin: 0 0 16px;
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <nav class="global-nav">
        <a href="home.html" class="nav-logo"><span>発注システム</span></a>
        <div class="nav-links">
            <a href="home.html" class="nav-item nav-home-link" aria-label="ホーム" title="ホーム"><svg class="nav-home-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <a href="products.html" class="nav-item">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item" data-feature="support">お問合わせ</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item nav-item--current">設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>

    <div class="container">
        <div class="account-profile-page">
            <header class="account-profile-header">
                <h1 class="account-page-title">アカウント設定</h1>
            </header>

            <div id="profile-load-status">読み込み中…</div>

            <div id="profile-main" style="display: none;">
                <section class="profile-form-panel" aria-labelledby="profile-form-heading">
                    <h2 id="profile-form-heading">ログイン情報</h2>
                    <p id="profile-account-note" class="profile-note" hidden></p>
                    <form id="profile-form" novalidate>
                        <div class="form-group" id="profile-user-id-group">
                            <label for="profile-user-id">ログインID</label>
                            <input type="text" id="profile-user-id" readonly>
                        </div>
                        <div class="form-group">
                            <label for="profile-customer-name">会社名</label>
                            <input type="text" id="profile-customer-name" readonly>
                        </div>
                        <div class="form-group" id="profile-contact-name-group">
                            <label for="profile-contact-name">担当者名</label>
                            <input type="text" id="profile-contact-name" maxlength="100" autocomplete="name">
                        </div>
                        <div class="form-group" id="profile-email-group">
                            <label for="profile-email">メールアドレス<span class="label-hint">　※パスワード再設定の通知先</span></label>
                            <input type="email" id="profile-email" maxlength="254" autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="profile-current-password">現在のパスワード</label>
                            <input type="password" id="profile-current-password" maxlength="200" autocomplete="current-password" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-new-password">新しいパスワード</label>
                            <input type="password" id="profile-new-password" maxlength="200" autocomplete="new-password">
                        </div>
                        <div class="profile-form-actions">
                            <button type="submit" id="profile-save-btn" class="btn-profile-save">保存</button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/account-profile.js"></script>
</body>
</html>
