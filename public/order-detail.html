<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文詳細 - 発注システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.history-page {
            background-color: #eef1f5;
        }

        body.history-page .container {
            background: #fff;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.history-page .history-page-title {
            margin: 0 0 4px 0;
            color: #111827;
            font-size: 1.35rem;
        }

        body.history-page .order-detail-meta {
            margin: 0 0 16px 0;
            font-size: 0.9rem;
            color: #6b7280;
        }

        body.history-page .btn-reorder {
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        body.history-page .btn-reorder:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        body.history-page .history-support-link {
            text-decoration: none;
            color: #374151;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid transparent;
        }

        body.history-page .history-support-link:hover {
            color: #111827;
            border-bottom-color: #d1d5db;
        }

        body.history-page .history-error {
            color: #b91c1c;
            padding: 1rem 0;
        }

        body.history-page .back-to-history {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2563eb;
            text-decoration: none;
        }

        body.history-page .back-to-history:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="history-page">
    <nav class="global-nav">
        <a href="home.html" class="nav-logo">
            <span>発注システム</span>
        </a>
        <div class="nav-links">

            <a href="products.html" class="nav-item">注文</a>
            <a href="cart.html" class="nav-item nav-cart" data-feature="cart">カート</a>
            <a href="history.html" class="nav-item" data-feature="history">注文履歴</a>
            <a href="kaitori.html" class="nav-item" data-feature="kaitori">空カートリッジ買取</a>
            <a href="support.html" class="nav-item" data-feature="support">サポート</a>
            <a href="https://www.e-kaisyu.jp/" target="_blank" class="nav-item" data-feature="collection">回収依頼</a>
            <a href="account.html" class="nav-item">アカウント設定</a>
            <a href="#" class="nav-item" id="logout-btn">ログアウト</a>
        </div>
    </nav>
    <div class="container">
        <header style="margin-bottom: 12px;">
            <h1 class="history-page-title">注文詳細</h1>
            <p id="order-detail-meta" class="order-detail-meta"></p>
        </header>
        <a href="history.html" class="back-to-history">← 注文履歴・配送状況に戻る</a>
        <div id="order-detail-main">
            <p class="order-detail-meta">読み込み中…</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/customer-order-detail-html.js"></script>
    <script src="order-detail.js"></script>
</body>

</html>
